services:
  postgres:
    image: postgres:16-alpine
    container_name: f1-chatbot-db
    environment:
      POSTGRES_DB: f1chatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - f1_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  f1_postgres_data:


