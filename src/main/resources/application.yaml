sspring:
  application:
    name: f1-ai-chatbot

  datasource:
    url: jdbc:postgresql://localhost:5432/f1chatdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

server:
  port: 8081

# ===================================
# Ollama
# ===================================
ollama:
  api:
    url: http://localhost:11434
    model: llama3.2

# ===================================
# Chat Settings
# ===================================
chat:
  max-history-size: 20
  session-timeout-minutes: 60

# ===================================
# Logging
# ===================================
logging:
  level:
    com.example.f1aichatbot: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate


